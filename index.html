<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Goal Wallet" />
  <meta name="theme-color" content="#05060b" />
  <title>Goal Wallet</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg bg1"></div><div class="bg bg2"></div><div class="bg bg3"></div>

  <div class="app">
    <main class="screen active" id="home">
      <header class="head">
        <div><p>SODOM FINANCE</p><h1>Кошелек целей</h1></div>
        <button class="icon" id="copyWallet">⧉</button>
      </header>

      <section class="balance-card glass">
        <div class="balance-row">
          <div><span>Текущий баланс</span><b id="balance">$0</b></div>
          <div class="ring">
            <svg viewBox="0 0 120 120"><circle class="ring-bg" cx="60" cy="60" r="50"></circle><circle class="ring-fill" id="ringFill" cx="60" cy="60" r="50"></circle></svg>
            <strong id="ringText">0%</strong>
          </div>
        </div>
        <div class="wallet" id="wallet"></div>
        <div class="progress"><i id="progressFill"></i></div>
        <div class="progress-info"><span id="progressMoney">$0 / $0</span><span id="progressLeft">целей нет</span></div>
      </section>

      <section class="quick">
        <button class="quick-btn glass" id="depositHome">+ Пополнить</button>
        <button class="quick-btn glass" id="withdrawHome">− Вычесть</button>
      </section>

      <section class="title-row">
        <div><p>GOALS</p><h2>Ближайшие цели</h2></div>
        <button class="plus" id="addGoalHome">+</button>
      </section>

      <section class="goal-list" id="homeGoals"></section>
    </main>

    <main class="screen" id="goals">
      <header class="head">
        <div><p>ALL GOALS</p><h1>Цели</h1></div>
        <button class="plus" id="addGoalGoals">+</button>
      </header>

      <div class="segmented glass">
        <button class="active" data-sort="new">Новые</button>
        <button data-sort="price">Цена</button>
        <button data-sort="close">Близко</button>
      </div>

      <section class="goal-list" id="allGoals"></section>
    </main>

    <main class="screen" id="money">
      <header class="head"><div><p>TRANSACTIONS</p><h1>Деньги</h1></div></header>
      <section class="pay glass">
        <button class="pay-btn plus-pay" id="depositMoney">+ Пополнить</button>
        <button class="pay-btn minus-pay" id="withdrawMoney">− Вычесть</button>
      </section>
      <section class="title-row small"><div><p>HISTORY</p><h2>История</h2></div><button class="text-btn" id="clearTx">очистить</button></section>
      <section class="tx-list" id="txList"></section>
    </main>

    <main class="screen" id="stats">
      <header class="head"><div><p>ANALYTICS</p><h1>Статы</h1></div></header>
      <section class="stats-grid" id="statsGrid"></section>
    </main>

    <main class="screen" id="settings">
      <header class="head"><div><p>SYSTEM</p><h1>Настройки</h1></div></header>
      <section class="settings-list">
        <button class="setting glass" id="editWallet"><span>Изменить адрес кошелька</span><b>›</b></button>
        <button class="setting glass" id="themeDark"><span>Темная тема</span><b>☾</b></button>
        <button class="setting glass" id="themeLight"><span>Светлая тема</span><b>☼</b></button>
        <button class="setting glass" id="exportData"><span>Экспорт данных</span><b>↓</b></button>
        <label class="setting glass import"><span>Импорт данных</span><b>↑</b><input id="importData" type="file" accept="application/json"></label>
        <button class="setting glass danger" id="resetAll"><span>Сбросить всё</span><b>×</b></button>
      </section>
    </main>

    <nav class="tabs glass">
      <button class="tab active" data-screen="home"><i>⌂</i><span>Дом</span></button>
      <button class="tab" data-screen="goals"><i>◎</i><span>Цели</span></button>
      <button class="tab" data-screen="money"><i>⇄</i><span>Деньги</span></button>
      <button class="tab" data-screen="stats"><i>◷</i><span>Статы</span></button>
      <button class="tab" data-screen="settings"><i>⚙</i><span>Сет</span></button>
    </nav>
  </div>

  <div class="sheet" id="goalSheet">
    <div class="sheet-card glass">
      <div class="grab"></div>
      <h3 id="goalSheetTitle">Добавить цель</h3>
      <input id="goalTitle" placeholder="Название цели" />
      <input id="goalAmount" type="number" inputmode="decimal" placeholder="Сумма в $" />
      <textarea id="goalNote" placeholder="Комментарий к цели: зачем, срок, детали"></textarea>
      <label class="upload"><input id="goalImage" type="file" accept="image/*" /><span id="uploadText">Выбрать картинку</span></label>
      <div class="sheet-actions">
        <button class="cancel" data-close="goalSheet">Отмена</button>
        <button class="save" id="saveGoal">Сохранить</button>
      </div>
    </div>
  </div>

  <div class="sheet" id="moneySheet">
    <div class="sheet-card glass">
      <div class="grab"></div>
      <h3 id="moneyTitle">Операция</h3>
      <input id="moneyAmount" type="number" inputmode="decimal" placeholder="Сумма в $" />
      <input id="moneyComment" placeholder="Комментарий, опционально" />
      <div class="sheet-actions">
        <button class="cancel" data-close="moneySheet">Отмена</button>
        <button class="save" id="saveMoney">Готово</button>
      </div>
    </div>
  </div>

  <div class="sheet" id="goalDetail">
    <div class="detail-card glass">
      <div class="detail-hero" id="detailHero"></div>
      <div class="detail-body">
        <div class="detail-top">
          <div><p>GOAL STATUS</p><h3 id="detailTitle">Цель</h3></div>
          <button class="icon mini" data-close="goalDetail">×</button>
        </div>
        <b class="detail-price" id="detailPrice">$0</b>
        <div class="progress detail-progress"><i id="detailProgress"></i></div>
        <div class="detail-meta"><span id="detailPercent">0%</span><span id="detailLeft">$0</span></div>
        <div class="note-box" id="detailNote">Комментарий не указан</div>
        <div class="detail-grid">
          <div><span>Создана</span><b id="detailDate">—</b></div>
          <div><span>Статус</span><b id="detailStatus">—</b></div>
        </div>
        <div class="sheet-actions">
          <button class="cancel" id="editGoalBtn">Редактировать</button>
          <button class="delete" id="deleteGoalBtn">Удалить</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="script.js"></script>
</body>
</html>
