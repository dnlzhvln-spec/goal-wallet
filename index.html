<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wallet Goals" />
  <meta name="theme-color" content="#05060b" />
  <title>Wallet Goals</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="orb orb-c"></div>

  <div class="iphone-frame">
    <main class="screen active" id="home">
      <header class="header">
        <div>
          <p class="kicker">SODOM FINANCE</p>
          <h1>Кошелек целей</h1>
        </div>
        <button class="round" id="copyWallet">⧉</button>
      </header>

      <section class="balance-card glass">
        <div class="shine"></div>
        <div class="balance-head">
          <div>
            <span class="label">Текущий баланс</span>
            <strong class="balance" id="balance">$0</strong>
          </div>
          <div class="ring">
            <svg viewBox="0 0 120 120">
              <circle class="ring-bg" cx="60" cy="60" r="50"></circle>
              <circle class="ring-fill" id="ringFill" cx="60" cy="60" r="50"></circle>
            </svg>
            <b id="ringText">0%</b>
          </div>
        </div>

        <div class="wallet" id="wallet">0x348310aD902f9e5DF0d3958fb7879e3b3F1813Cc</div>

        <div class="bar"><i id="barFill"></i></div>
        <div class="bar-meta">
          <span id="progressMoney">$0 / $0</span>
          <span id="progressLeft">целей нет</span>
        </div>
      </section>

      <section class="quick-grid">
        <button class="quick glass" id="quickDeposit"><span>+</span>Пополнить</button>
        <button class="quick glass" id="quickWithdraw"><span>−</span>Вычесть</button>
      </section>

      <section class="section-title">
        <div>
          <p class="kicker">GOALS</p>
          <h2>Ближайшие цели</h2>
        </div>
        <button class="add-btn" id="addGoalA">+</button>
      </section>

      <section class="cards" id="homeGoals"></section>
    </main>

    <main class="screen" id="goals">
      <header class="header">
        <div>
          <p class="kicker">ALL GOALS</p>
          <h1>Цели</h1>
        </div>
        <button class="add-btn" id="addGoalB">+</button>
      </header>
      <div class="sort glass">
        <button data-sort="new" class="active">Новые</button>
        <button data-sort="price">Цена</button>
        <button data-sort="close">Близко</button>
      </div>
      <section class="cards" id="allGoals"></section>
    </main>

    <main class="screen" id="tx">
      <header class="header">
        <div>
          <p class="kicker">TRANSACTIONS</p>
          <h1>Операции</h1>
        </div>
      </header>

      <section class="pay-card glass">
        <button class="pay plus" id="deposit">+ Пополнить</button>
        <button class="pay minus" id="withdraw">− Вычесть</button>
      </section>

      <section class="section-title compact">
        <div>
          <p class="kicker">HISTORY</p>
          <h2>История</h2>
        </div>
        <button class="text-btn" id="clearHistory">очистить</button>
      </section>
      <section class="tx-list" id="txList"></section>
    </main>

    <main class="screen" id="stats">
      <header class="header">
        <div>
          <p class="kicker">ANALYTICS</p>
          <h1>Статистика</h1>
        </div>
      </header>
      <section class="stats" id="statsGrid"></section>
    </main>

    <main class="screen" id="settings">
      <header class="header">
        <div>
          <p class="kicker">SYSTEM</p>
          <h1>Настройки</h1>
        </div>
      </header>
      <section class="settings">
        <button class="setting glass" id="editWallet"><span>Изменить адрес кошелька</span><b>›</b></button>
        <button class="setting glass" id="dark"><span>Темная тема</span><b>☾</b></button>
        <button class="setting glass" id="light"><span>Светлая тема</span><b>☼</b></button>
        <button class="setting glass" id="exportData"><span>Экспортировать данные</span><b>↓</b></button>
        <label class="setting glass file-import"><span>Импортировать данные</span><b>↑</b><input type="file" id="importData" accept="application/json"></label>
        <button class="setting danger glass" id="reset"><span>Сбросить всё</span><b>×</b></button>
      </section>
    </main>

    <nav class="tabs glass">
      <button class="tab active" data-target="home"><i>⌂</i><span>Дом</span></button>
      <button class="tab" data-target="goals"><i>◎</i><span>Цели</span></button>
      <button class="tab" data-target="tx"><i>⇄</i><span>Деньги</span></button>
      <button class="tab" data-target="stats"><i>◷</i><span>Статы</span></button>
      <button class="tab" data-target="settings"><i>⚙</i><span>Сет</span></button>
    </nav>
  </div>

  <div class="sheet" id="goalSheet">
    <div class="sheet-card glass">
      <div class="grabber"></div>
      <h3>Добавить цель</h3>
      <input id="goalTitle" placeholder="Название цели" />
      <input id="goalAmount" type="number" inputmode="decimal" placeholder="Сумма в $" />
      <label class="upload">
        <input id="goalPic" type="file" accept="image/*" />
        <span id="uploadText">Выбрать картинку</span>
      </label>
      <div class="sheet-actions">
        <button class="cancel" data-close="goalSheet">Отмена</button>
        <button class="save" id="saveGoal">Сохранить</button>
      </div>
    </div>
  </div>

  <div class="sheet" id="moneySheet">
    <div class="sheet-card glass">
      <div class="grabber"></div>
      <h3 id="moneyTitle">Операция</h3>
      <input id="moneyAmount" type="number" inputmode="decimal" placeholder="Сумма в $" />
      <input id="moneyComment" placeholder="Комментарий" />
      <div class="sheet-actions">
        <button class="cancel" data-close="moneySheet">Отмена</button>
        <button class="save" id="saveMoney">Готово</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="script.js"></script>
</body>
</html>
